name: Periodic deployed service health check

on:
  workflow_dispatch:    # Allows you to manually trigger this workflow
  schedule:
    - cron: '0 0 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check the deployed service URL
        uses: jtalk/url-health-check-action@v5
        with:
          url: https://cpus-sql.onrender.com
